<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; height: 100vh; background: #333; box-sizing: border-box; }
  .container {
    background: red;
    width: 100%;
    /* R = 3.0 (very wide) */
    aspect-ratio: 3 / 1;
    max-height: 90vh;
    max-width: calc(90vh * 3);
  }
  .image {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>
  <div class="container" id="cont">
    <img class="image" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 3000 1000'%3E%3Crect width='3000' height='1000' fill='green'/%3E%3C/svg%3E" />
  </div>
</body>
</html>
