<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #333; }
  .wrapper {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .container {
    position: relative;
    /* The magic to shrink-wrap an image that has max-width/max-height */
    display: inline-block;
  }
  .image {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
    width: auto;
    height: auto;
  }
</style>
</head>
<body>
  <div class="wrapper">
    <div class="container" id="cont">
      <img class="image" id="img" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1000 2000'%3E%3Crect width='1000' height='2000' fill='green'/%3E%3C/svg%3E" />
    </div>
  </div>
  <script>
    console.log(document.getElementById('cont').getBoundingClientRect().width);
    console.log(document.getElementById('img').getBoundingClientRect().width);
  </script>
</body>
</html>
